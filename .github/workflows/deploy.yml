name: Deploy Open4Printing to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm --filter @workspace/open4printing build
        env:
          PORT: 5000
          BASE_PATH: /

      - name: Find and prepare built site
        run: |
          echo "Finding built index.html..."
          INDEX_FILE=$(find artifacts/open4printing -path "*/index.html" -not -path "*/node_modules/*" -print -quit)

          if [ -z "$INDEX_FILE" ]; then
            echo "No index.html found after build."
            echo "Here are the folders/files after build:"
            find artifacts/open4printing -maxdepth 4 -type f
            exit 1
          fi

          echo "Found index.html at: $INDEX_FILE"
          DIST_DIR=$(dirname "$INDEX_FILE")
          echo "Using build output folder: $DIST_DIR"

          mkdir -p pages-dist
          cp -a "$DIST_DIR"/. pages-dist/

          echo "open4printing.com" > pages-dist/CNAME
          cp pages-dist/index.html pages-dist/404.html

          echo "Final deploy folder:"
          ls -la pages-dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
