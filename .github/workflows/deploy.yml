name: Deploy Open4Printing to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm --filter @workspace/open4printing build
        env:
          PORT: 5000
          BASE_PATH: /

      - name: Add custom domain and SPA fallback
        run: |
          echo "open4printing.com" > artifacts/open4printing/dist/CNAME
          cp artifacts/open4printing/dist/index.html artifacts/open4printing/dist/404.html
          ls -la artifacts/open4printing/dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/open4printing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
