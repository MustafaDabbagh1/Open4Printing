openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Open4Printing API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: orders
  - name: admin
  - name: payments
  - name: products
  - name: quotes
  - name: coupons
  - name: customers
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products/{slug}:
    get:
      operationId: getPublicProduct
      tags: [products]
      summary: Public product detail (used to load upload rules)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProduct"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Submit a new order from checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderConfirmation"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderNumber}:
    get:
      operationId: getOrderByNumber
      tags: [orders]
      summary: Look up an order by its public order number (for confirmation page)
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderNumber}/proof-response:
    post:
      operationId: respondToProof
      tags: [orders]
      summary: Customer approves or requests changes on a proof (verified by email)
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProofResponseBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /quotes:
    post:
      operationId: createQuoteRequest
      tags: [quotes]
      summary: Submit a quote request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteBody"
      responses:
        "201":
          description: Quote request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      summary: Validate a coupon/promo code at checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponBody"
      responses:
        "200":
          description: Coupon details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponInfo"
        "404":
          description: Invalid coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customer/register:
    post:
      operationId: customerRegister
      tags: [customers]
      summary: Create a customer account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegisterBody"
      responses:
        "200":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerMe"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customer/login:
    post:
      operationId: customerLogin
      tags: [customers]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerMe"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customer/logout:
    post:
      operationId: customerLogout
      tags: [customers]
      summary: Customer logout
      responses:
        "204":
          description: Logged out

  /customer/me:
    get:
      operationId: customerMe
      tags: [customers]
      summary: Current customer session
      responses:
        "200":
          description: Current customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerMe"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customer/orders:
    get:
      operationId: listCustomerOrders
      tags: [customers]
      summary: Past orders for the signed-in customer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /customer/addresses:
    get:
      operationId: listCustomerAddresses
      tags: [customers]
      summary: Saved addresses for the signed-in customer
      responses:
        "200":
          description: Addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedAddress"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createCustomerAddress
      tags: [customers]
      summary: Save a new address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAddressBody"
      responses:
        "201":
          description: Address saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAddress"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "204":
          description: Logged out

  /admin/me:
    get:
      operationId: adminMe
      tags: [admin]
      summary: Current admin session
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMe"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/dashboard/stats:
    get:
      operationId: getAdminDashboardStats
      tags: [admin]
      summary: Aggregated stats for the admin dashboard
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardStats"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders (newest first)
      parameters:
        - name: search
          in: query
          required: false
          schema: { type: string }
        - name: orderStatus
          in: query
          required: false
          schema: { type: string }
        - name: paymentStatus
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}:
    get:
      operationId: getAdminOrder
      tags: [admin]
      summary: Get a single order with items, files, payments, internal notes, and proof
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminOrder
      tags: [admin]
      summary: Update order, payment, proof status, internal notes, or estimated ready date
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/duplicate:
    post:
      operationId: duplicateAdminOrder
      tags: [admin]
      summary: Reorder — clone an order's items into a new draft order
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Duplicated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderConfirmation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders/{id}/proof:
    post:
      operationId: setAdminOrderProof
      tags: [admin]
      summary: Attach a proof file to an order and mark proof as sent
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetProofBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    get:
      operationId: listAdminProducts
      tags: [admin]
      summary: List all products (admin)
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProduct"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createAdminProduct
      tags: [admin]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    patch:
      operationId: updateAdminProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAdminProduct
      tags: [admin]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/quotes:
    get:
      operationId: listAdminQuotes
      tags: [admin]
      summary: List quote requests
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Quote requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteRequest"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/quotes/{id}:
    get:
      operationId: getAdminQuote
      tags: [admin]
      summary: Get a single quote request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Quote request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteRequestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAdminQuote
      tags: [admin]
      summary: Update quote status, admin notes, quoted amount
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteBody"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteRequestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /payments/authorize-net/charge:
    post:
      operationId: chargeAuthorizeNet
      tags: [payments]
      summary: Charge a card via Authorize.net (placeholder integration)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizeNetChargeBody"
      responses:
        "200":
          description: Charge result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizeNetChargeResult"
        "400":
          description: Validation or charge error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    Address:
      type: object
      properties:
        line1: { type: string }
        line2: { type: ["string", "null"] }
        city: { type: string }
        state: { type: string }
        postalCode: { type: string }
        country: { type: string }
      required: [line1, city, state, postalCode, country]

    OrderItemOptions:
      type: object
      additionalProperties:
        oneOf:
          - { type: string }
          - { type: number }

    ProductUploadConfig:
      type: object
      properties:
        artworkRequired: { type: boolean }
        allowsBackUpload: { type: boolean }
        preferredFormats:
          type: array
          items: { type: string }
        notes: { type: string }
      required: [artworkRequired, allowsBackUpload, preferredFormats, notes]

    PublicProduct:
      type: object
      properties:
        id: { type: integer }
        slug: { type: string }
        name: { type: string }
        categorySlug: { type: string }
        shortDescription: { type: string }
        description: { type: string }
        startingPrice: { type: number }
        enabled: { type: boolean }
        uploadConfig: { $ref: "#/components/schemas/ProductUploadConfig" }
      required: [id, slug, name, categorySlug, shortDescription, description, startingPrice, enabled, uploadConfig]

    CreateOrderItem:
      type: object
      properties:
        productSlug: { type: string }
        productName: { type: string }
        options:
          $ref: "#/components/schemas/OrderItemOptions"
        quantity: { type: integer, minimum: 1 }
        unitPrice: { type: number }
        lineTotal: { type: number }
        uploadedFileIds:
          type: array
          items: { type: integer }
      required: [productSlug, productName, quantity, unitPrice, lineTotal]

    CreateOrderBody:
      type: object
      properties:
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: ["string", "null"] }
        billingAddress: { $ref: "#/components/schemas/Address" }
        shippingAddress: { $ref: "#/components/schemas/Address" }
        notes: { type: string }
        deliveryMethod:
          type: string
          enum: [shipping, pickup]
        pickupInstructions: { type: string }
        discountCode: { type: ["string", "null"] }
        discountAmount: { type: number }
        items:
          type: array
          items: { $ref: "#/components/schemas/CreateOrderItem" }
        subtotal: { type: number }
        tax: { type: number }
        shipping: { type: number }
        total: { type: number }
      required: [email, firstName, lastName, billingAddress, shippingAddress, items, subtotal, total]

    OrderConfirmation:
      type: object
      properties:
        orderNumber: { type: string }
        id: { type: integer }
        total: { type: number }
        paymentStatus: { type: string }
        orderStatus: { type: string }
      required: [orderNumber, id, total, paymentStatus, orderStatus]

    OrderItemDetail:
      type: object
      properties:
        id: { type: integer }
        productSlug: { type: string }
        productName: { type: string }
        options: { $ref: "#/components/schemas/OrderItemOptions" }
        quantity: { type: integer }
        unitPrice: { type: number }
        lineTotal: { type: number }
        files:
          type: array
          items: { $ref: "#/components/schemas/UploadedFileInfo" }
      required: [id, productSlug, productName, options, quantity, unitPrice, lineTotal, files]

    UploadedFileInfo:
      type: object
      properties:
        id: { type: integer }
        originalName: { type: string }
        fileType: { type: string }
        fileSize: { type: integer }
        side:
          type: ["string", "null"]
          enum: [front, back, null]
        isProof: { type: boolean }
        uploadedAt: { type: string, format: date-time }
      required: [id, originalName, fileType, fileSize, uploadedAt]

    PaymentInfo:
      type: object
      properties:
        id: { type: integer }
        provider: { type: string }
        providerTransactionId: { type: ["string", "null"] }
        amount: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, provider, amount, status, createdAt]

    OrderDetail:
      type: object
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        firstName: { type: string }
        lastName: { type: string }
        billingAddress: { $ref: "#/components/schemas/Address" }
        shippingAddress: { $ref: "#/components/schemas/Address" }
        notes: { type: string }
        deliveryMethod: { type: string }
        pickupInstructions: { type: string }
        estimatedReadyDate: { type: ["string", "null"], format: date-time }
        discountCode: { type: ["string", "null"] }
        discountAmount: { type: number }
        subtotal: { type: number }
        tax: { type: number }
        shipping: { type: number }
        total: { type: number }
        paymentStatus: { type: string }
        orderStatus: { type: string }
        proofStatus: { type: string }
        proofFileId: { type: ["integer", "null"] }
        proofComment: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItemDetail" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/PaymentInfo" }
      required:
        - id
        - orderNumber
        - email
        - firstName
        - lastName
        - billingAddress
        - shippingAddress
        - notes
        - deliveryMethod
        - pickupInstructions
        - discountAmount
        - subtotal
        - tax
        - shipping
        - total
        - paymentStatus
        - orderStatus
        - proofStatus
        - proofComment
        - createdAt
        - updatedAt
        - items
        - payments

    AdminOrderDetail:
      type: object
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        firstName: { type: string }
        lastName: { type: string }
        billingAddress: { $ref: "#/components/schemas/Address" }
        shippingAddress: { $ref: "#/components/schemas/Address" }
        notes: { type: string }
        internalNotes: { type: string }
        deliveryMethod: { type: string }
        pickupInstructions: { type: string }
        estimatedReadyDate: { type: ["string", "null"], format: date-time }
        discountCode: { type: ["string", "null"] }
        discountAmount: { type: number }
        subtotal: { type: number }
        tax: { type: number }
        shipping: { type: number }
        total: { type: number }
        paymentStatus: { type: string }
        orderStatus: { type: string }
        proofStatus: { type: string }
        proofFileId: { type: ["integer", "null"] }
        proofComment: { type: string }
        proofFile:
          oneOf:
            - { $ref: "#/components/schemas/UploadedFileInfo" }
            - { type: "null" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItemDetail" }
        payments:
          type: array
          items: { $ref: "#/components/schemas/PaymentInfo" }
      required:
        - id
        - orderNumber
        - email
        - firstName
        - lastName
        - billingAddress
        - shippingAddress
        - notes
        - internalNotes
        - deliveryMethod
        - pickupInstructions
        - discountAmount
        - subtotal
        - tax
        - shipping
        - total
        - paymentStatus
        - orderStatus
        - proofStatus
        - proofComment
        - createdAt
        - updatedAt
        - items
        - payments

    OrderSummary:
      type: object
      properties:
        id: { type: integer }
        orderNumber: { type: string }
        email: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        total: { type: number }
        paymentStatus: { type: string }
        orderStatus: { type: string }
        itemCount: { type: integer }
        createdAt: { type: string, format: date-time }
      required: [id, orderNumber, email, firstName, lastName, total, paymentStatus, orderStatus, itemCount, createdAt]

    UpdateOrderBody:
      type: object
      properties:
        orderStatus: { type: ["string", "null"] }
